name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: SideSeat-CI-2026!
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "bash -c '</dev/tcp/localhost/1433'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 18
          --health-start-period 20s

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      NUGET_XMLDOC_MODE: skip
      SQL_TEST_CONNECTION: "Server=localhost,1433;Database=master;User Id=sa;Password=SideSeat-CI-2026!;TrustServerCertificate=True;Encrypt=False"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore SideSeat.slnx

      - name: Build
        run: dotnet build SideSeat.slnx --configuration Release --no-restore

      - name: Run integration tests
        run: >
          dotnet test tests/SideSeat.IntegrationTests/SideSeat.IntegrationTests.csproj
          --configuration Release
          --no-build
          --logger "trx;LogFileName=sideseat-tests.trx"
          --collect "XPlat Code Coverage"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sideseat-test-results
          path: TestResults
          if-no-files-found: warn
          retention-days: 14
